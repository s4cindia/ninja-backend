name: Build Docling Service

on:
  push:
    branches:
      - feature/ml-docling-integration
      - main
    paths:
      - 'docling-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Dockerfile syntax
        run: docker build --dry-run ./docling-service/ 2>/dev/null \
             || echo "dry-run not supported — skipping"

      - name: Install dependencies (no model download)
        working-directory: docling-service
        run: |
          pip install fastapi uvicorn pydantic requests
          echo "Dependency install validated"

      - name: Check main.py syntax
        working-directory: docling-service
        run: python -m py_compile main.py && echo "Syntax OK"

      - name: Check smoke_test.py syntax
        working-directory: docling-service
        run: python -m py_compile smoke_test.py && echo "Syntax OK"
